<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ezasekasi Spaza Shop</title>
    <style>
        :root { 
            --tut-blue: #0054a6; 
            --tut-yellow: #ffcc00; 
            --tut-red: #ed1c24; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            border-top: 10px solid var(--tut-blue); 
            width: 380px; 
            text-align: center; 
        }

        .logo-placeholder {
            font-size: 24px;
            font-weight: bold;
            color: var(--tut-blue);
            margin-bottom: 5px;
        }

        .campus-tag {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 25px;
            display: block;
        }

        h2 { 
            color: #333; 
            margin-bottom: 20px; 
            font-weight: 600;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            box-sizing: border-box; 
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--tut-blue);
        }

        .btn-login { 
            width: 100%; 
            padding: 14px; 
            background: var(--tut-blue); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-login:hover { 
            background: #003d7a; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .error-msg { 
            color: var(--tut-red); 
            font-size: 0.9em; 
            margin-top: 20px; 
            background: #ffecec; 
            padding: 12px; 
            border-radius: 6px; 
            border-left: 5px solid var(--tut-red);
            text-align: left;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.75em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-placeholder">EZASEKASI SPAZA</div>
        <span class="campus-tag">TUT Emalahleni | Management System</span>
        
        <h2>Staff Login</h2>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Access Dashboard</button>
        </form>
        
        {% if error %}
        <div class="error-msg">
            <strong>Access Denied:</strong> {{ error }}
        </div>
        {% endif %}

        <div class="footer-text">
            &copy; 2026 Groupros. All rights reserved.
        </div>
    </div>
</body>
</html>
