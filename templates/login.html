<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ezasekasi Spaza Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0054a6 0%, #1e6ab8 100%);
            padding: var(--spacing-md);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #0054a6 0%, #1e6ab8 100%);
            color: white;
            padding: var(--spacing-xxl);
            text-align: center;
        }

        .login-brand {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-body {
            padding: var(--spacing-xxl);
        }

        .login-title {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: var(--spacing-sm);
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: var(--spacing-md);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            transition: var(--transition);
            background: #fafbfc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-white);
            box-shadow: 0 0 0 3px rgba(0, 84, 166, 0.1);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            padding: var(--spacing-md) var(--spacing-lg);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .error-alert {
            background: rgba(231, 76, 60, 0.1);
            border-left: 4px solid var(--danger);
            color: #78281f;
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            font-size: 0.9rem;
        }

        .login-footer {
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-xxl);
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-light);
        }

        @media (max-width: 480px) {
            .login-header {
                padding: var(--spacing-lg);
            }

            .login-body {
                padding: var(--spacing-lg);
            }

            .login-brand {
                font-size: 1.5rem;
            }

            .login-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-brand">EZASEKASI SPAZA</div>
            <div class="login-subtitle">Management System</div>
        </div>

        <div class="login-body">
            <h2 class="login-title">Staff Login</h2>

            {% if error %}
            <div class="error-alert">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login">Access Dashboard</button>
            </form>
        </div>

        <div class="login-footer">
            &copy; 2026 Ezasekasi Team. All rights reserved. <br>
            Tshwane University of Technology - Emalahleni Campus
        </div>
    </div>
</body>
</html>
