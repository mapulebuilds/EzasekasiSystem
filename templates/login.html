<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ezasekasi Spaza Shop</title>
    <style>
        :root { 
            --tut-blue: #0054a6; 
            --tut-blue-light: #1e6ab8;
            --tut-yellow: #ffcc00; 
            --tut-red: #ed1c24; 
            --tut-red-light: #f54747;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            color: #2c3e50;
        }

        .login-card { 
            background: white; 
            padding: 48px 42px; 
            border-radius: 12px; 
            box-shadow: var(--shadow-md); 
            border-top: 5px solid var(--tut-blue); 
            width: 100%;
            max-width: 400px; 
            text-align: center;
        }

        .logo-placeholder {
            font-size: 28px;
            font-weight: 700;
            color: var(--tut-blue);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .campus-tag {
            color: #7f8c8d;
            font-size: 0.8em;
            margin-bottom: 32px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        h2 { 
            color: var(--tut-blue); 
            margin-bottom: 28px; 
            font-weight: 600;
            font-size: 1.4em;
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            margin: 10px 0; 
            border: 2px solid #d5dce3; 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: var(--transition);
            background: #fafbfc;
            font-size: 0.95em;
            font-family: inherit;
        }

        input::placeholder {
            color: #95a3b3;
        }

        input:focus {
            outline: none;
            border-color: var(--tut-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 84, 166, 0.1);
        }

        .btn-login { 
            width: 100%; 
            padding: 14px 18px; 
            background: var(--tut-blue); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 0.95em;
            margin-top: 16px;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            box-shadow: var(--shadow-sm);
        }

        .btn-login:hover { 
            background: var(--tut-blue-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg { 
            color: #b8181f; 
            font-size: 0.9em; 
            margin-top: 24px; 
            background: #f8d7da; 
            padding: 14px 16px; 
            border-radius: 6px; 
            border-left: 4px solid var(--tut-red);
            text-align: left;
            border: 1px solid #f5c6cb;
        }

        .footer-text {
            margin-top: 32px;
            font-size: 0.75em;
            color: #95a3b3;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 28px;
                margin: 20px;
            }

            h2 {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-placeholder">EZASEKASI SPAZA</div>
        <span class="campus-tag">TUT Emalahleni | Management System</span>
        
        <h2>Staff Login</h2>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Access Dashboard</button>
        </form>
        
        {% if error %}
        <div class="error-msg">
            <strong>Access Denied:</strong> {{ error }}
        </div>
        {% endif %}

        <div class="footer-text">
            &copy; 2026 Ezasekasi Team. All rights reserved.
        </div>
    </div>
</body>
</html>
