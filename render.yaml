services:
  - type: web
    name: ezasekasisystem
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ezasekasi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13"
    autoDeploy: true

databases:
  - name: ezasekasi-db
    plan: free
    databaseName: ezasekasi_db
    ipAllowList: []
